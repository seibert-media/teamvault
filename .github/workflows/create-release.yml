name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating a GitHub release or publishing to PyPI"
        required: false
        type: boolean
        default: true
      version:
        description: 'New version (e.g., 0.2.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@v3.1.1 # immutable
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Install system dependencies for python-ldap
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libldap2-dev libsasl2-dev

      - name: Set up bun
        id: bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Restore bun cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.bun.outputs.bun-version }}-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Frontend Install Dependencies and Build
        run: |
          bun install
          bun run build
        working-directory: ${{ github.workspace }}

      - name: Zip Bundle
        run: |
          zip -r "$BUNDLE_ZIP" bundled
        env:
          BUNDLE_ZIP: ${{ github.workspace }}/teamvault/static/bundled.zip
        working-directory: ${{ github.workspace }}/teamvault/static

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0 # immutable

      - name: Update version
        run: |
          # If the input is a bump type, uv handles it automatically. If not, it sets the specific version
          uv version ${{ github.event.inputs.version }}

      - name: Commit and Tag Release
        if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ secrets.RELEASE_BOT_APP_ID }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add pyproject.toml uv.lock
          git commit -m "Release v${{ github.event.inputs.version }}"
          git tag -a "v${{ github.event.inputs.version }}" -m "Version ${{ github.event.inputs.version }}"
          git push origin main --tags

      - name: Build Distributions
        run: uv build

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: |
            dist/*
            ${{ github.workspace }}/teamvault/static/bundled.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect wheel contents (smoke test)
        run: |
          unzip -l dist/*.whl | grep -E "teamvault/static/bundled|webpack-stats.json"

      # For manual runs: test publish logic, but don't upload anything
      - name: Publish to PyPI (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: |
          uv publish --dry-run

      # For real releases: actually publish
      - name: Publish package distribution to PyPI with uv
        if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
        run: |
          uv publish --trusted-publishing always
